# Minimal config for Tempo 2.10.x (monolithic mode).
# Compactor block removed - not in app.Config for 2.10; backend_scheduler handles compaction.
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks