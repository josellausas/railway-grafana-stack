# Notification policy tree for Grafana 11+.
# Receiver must match a provisioned contact point name exactly (slack-webengine).
# See: https://grafana.com/docs/grafana/latest/alerting/set-up/provision-alerting-resources/file-provisioning/
apiVersion: 1

policies:
  - orgId: 1
    receiver: slack-webengine
    group_by: ['grafana_folder', 'alertname']
